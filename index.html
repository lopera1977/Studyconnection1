<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rede Global dos Sabores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f2ef;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .app {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .header {
            padding: 14px;
            background: linear-gradient(140deg, #1a1a2e, #2d4a6e);
            color: #fff;
        }
        .header h1 {
            font-size: 14px;
            margin: 0;
        }
        .header p {
            font-size: 11px;
            opacity: 0.85;
            margin: 4px 0 0;
        }
        .select-box {
            padding: 10px;
            background: #f8f7f4;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            font-weight: 600;
        }
        .menu2 {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
            font-weight: 600;
        }
        .menu2 div {
            cursor: pointer;
            padding: 6px 0;
        }
        /* Imagem de pizza gigante que ocupa todo o espaço restante */
        .pizza-gigante {
            position: relative;
            flex: 1;  /* ocupa todo o espaço disponível entre o menu2 e o footer */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .pizza-gigante img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;  /* garante que a imagem cubra toda a área, mesmo que corte */
        }
        .buttons-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 10px;
            justify-content: center;
            z-index: 2;
        }
        button {
            padding: 10px 16px;
            border-radius: 22px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .primary {
            background: #1a1a2e;
            color: #fff;
        }
        .secondary {
            background: #fff;
            color: #1a1a2e;
        }
        .footer-small {
            text-align: center;
            font-size: 10px;
            padding: 12px;
            background: #fff;
            color: #666;
            border-top: 1px solid #eee;
            width: 100%;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #fff;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            max-height: 80vh;
            overflow: auto;
        }
        .country-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .country-item, .rest-item {
            padding: 8px;
            background: #f4f2ef;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rest-nome {
            font-size: 14px;
            font-weight: 500;
            flex:1;
            text-align: left;
        }
        .map-icon, .enter-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }
        .enter-btn {
            background: #1a1a2e;
            color: #fff;
            border-radius: 20px;
            font-size: 11px;
            padding: 4px 10px;
        }
        .simul-map {
            width: 100%;
            height: 180px;
            background: #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            flex-direction: column;
        }
        @media (max-width: 480px) {
            .app {
                max-width: 100%;
                margin: 0;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1 id="titulo">🌍 Rede Global dos Sabores</h1>
        <p id="sub">Uma tecnologia de ponta que localiza e conecta cultura gastronómica global</p>
    </div>
    <div class="select-box">
        <select id="lingua">
            <option value="pt">🇵🇹 Português</option>
            <option value="en">🇬🇧 Inglês</option>
            <option value="fr">🇫🇷 Francês</option>
            <option value="de">🇩🇪 Alemão</option>
            <option value="nl">🇳🇱 Holandês</option>
        </select>
    </div>
    <div class="menu2">
        <div id="mAcerca">📖 Acerca</div>
        <div id="mTermos">📜 Termos</div>
        <div id="mLocalizar">📍 Localizar</div>
    </div>
    <!-- Imagem de pizza gigante que ocupa todo o espaço -->
    <div class="pizza-gigante">
        <img src="https://images.pexels.com/photos/1653877/pexels-photo-1653877.jpeg" alt="Pizza gigante">
        <div class="buttons-overlay">
            <button class="primary" id="btnMenu">🍽️ Menu</button>
            <button class="secondary" id="btnLogin">🔐 Login</button>
        </div>
    </div>
    <div class="footer-small">Copyright@2026</div>
</div>

<div id="modal" class="modal">
    <div class="modal-box" id="modalBox"></div>
</div>

<script>
    const T = {
        pt: {
            titulo: "🌍 Rede Global dos Sabores",
            sub: "Uma tecnologia de ponta que localiza e conecta cultura gastronómica global",
            menu: "🍽️ Menu",
            login: "🔐 Login",
            acerca: "📖 Acerca",
            termos: "📜 Termos",
            localizar: "📍 Localizar",
            txtAcerca: "Plataforma que conecta culturas gastronómicas de todo o mundo.",
            txtTermos: "Termos e condições de utilização.",
            mapa: "Restaurantes disponíveis",
            modalTitulo: "Selecione um país",
            moeda: "Kz",
            restaurantesTitulo: "Restaurantes em "
        },
        en: {
            titulo: "🌍 Global Flavors Network",
            sub: "Cutting-edge technology that locates and connects global gastronomic culture",
            menu: "🍽️ Menu",
            login: "🔐 Login",
            acerca: "📖 About",
            termos: "📜 Terms",
            localizar: "📍 Locate",
            txtAcerca: "Platform connecting gastronomic cultures worldwide.",
            txtTermos: "Terms and conditions of use.",
            mapa: "Available restaurants",
            modalTitulo: "Select a country",
            moeda: "£",
            restaurantesTitulo: "Restaurants in "
        },
        fr: {
            titulo: "🌍 Réseau Mondial des Saveurs",
            sub: "Une technologie de pointe qui localise et connecte la culture gastronomique mondiale",
            menu: "🍽️ Menu",
            login: "🔐 Connexion",
            acerca: "📖 À propos",
            termos: "📜 Conditions",
            localizar: "📍 Localiser",
            txtAcerca: "Plateforme connectant les cultures gastronomiques.",
            txtTermos: "Conditions d'utilisation.",
            mapa: "Restaurants disponibles",
            modalTitulo: "Choisissez un pays",
            moeda: "€",
            restaurantesTitulo: "Restaurants en "
        },
        de: {
            titulo: "🌍 Globales Geschmacksnetzwerk",
            sub: "Spitzentechnologie, die globale gastronomische Kultur lokalisiert und verbindet",
            menu: "🍽️ Menü",
            login: "🔐 Anmelden",
            acerca: "📖 Über uns",
            termos: "📜 AGB",
            localizar: "📍 Standort",
            txtAcerca: "Plattform für gastronomische Kulturen.",
            txtTermos: "Nutzungsbedingungen.",
            mapa: "Verfügbare Restaurants",
            modalTitulo: "Land auswählen",
            moeda: "€",
            restaurantesTitulo: "Restaurants in "
        },
        nl: {
            titulo: "🌍 Wereldwijd Smaaknetwerk",
            sub: "Geavanceerde technologie die de mondiale gastronomische cultuur lokaliseert en verbindt",
            menu: "🍽️ Menu",
            login: "🔐 Inloggen",
            acerca: "📖 Over ons",
            termos: "📜 Voorwaarden",
            localizar: "📍 Vind",
            txtAcerca: "Platform voor gastronomische culturen.",
            txtTermos: "Gebruiksvoorwaarden.",
            mapa: "Beschikbare restaurants",
            modalTitulo: "Selecteer een land",
            moeda: "€",
            restaurantesTitulo: "Restaurants in "
        }
    };

    let lang = "pt";
    let paisesLista = [
        "Angola", "Brasil", "Portugal", "França", "Alemanha", "Holanda", "Inglaterra", "Espanha", "Itália", "EUA",
        "Canadá", "México", "Argentina", "Chile", "Peru", "Colômbia", "Venezuela", "Cabo Verde", "Moçambique", "Guiné-Bissau",
        "São Tomé", "Austrália", "Japão", "China", "Índia", "África do Sul", "Marrocos", "Egito", "Turquia", "Rússia"
    ];

    const restTipicos = {
        "Angola": "Restaurante Luanda", "Brasil": "Churrascaria Brasil", "Portugal": "Tasca do Minho",
        "França": "Le Petit Bistrot", "Alemanha": "Biergarten München", "Holanda": "Dutch Herring House",
        "Inglaterra": "The Queen's Pub", "Espanha": "Tapas y Sol", "Itália": "Pasta e Vino", "EUA": "Burger & Fries",
        "Canadá": "Maple Leaf Diner", "México": "Cantina Mexicana", "Argentina": "Parrilla Argentina",
        "Chile": "Mar y Vino", "Peru": "Cevicheria Peruana", "Colômbia": "Café Colombiano", "Venezuela": "Arepera Venezolana",
        "Cabo Verde": "Cachupa & Cia", "Moçambique": "Piri-Piri", "Guiné-Bissau": "Mantiça", "São Tomé": "Roça Saudade",
        "Austrália": "Outback Grill", "Japão": "Sushi Sakura", "China": "Pato Laqueado", "Índia": "Tandoori Palace",
        "África do Sul": "Braai House", "Marrocos": "Couscous Royal", "Egito": "Nilópolis", "Turquia": "Kebab Istanbul",
        "Rússia": "Stolovaya"
    };

    function getRestaurantesPorPais(pais) {
        let nomeTipico = restTipicos[pais] || "Restaurante " + pais;
        let lista = [nomeTipico];
        for (let i = 2; i <= 10; i++) lista.push(`Restaurante ${pais} ${i}`);
        return lista;
    }

    function aplicarLingua() {
        const t = T[lang];
        document.getElementById("titulo").innerText = t.titulo;
        document.getElementById("sub").innerText = t.sub;
        document.getElementById("btnMenu").innerText = t.menu;
        document.getElementById("btnLogin").innerText = t.login;
        document.getElementById("mAcerca").innerText = t.acerca;
        document.getElementById("mTermos").innerText = t.termos;
        document.getElementById("mLocalizar").innerText = t.localizar;
    }
    document.getElementById("lingua").onchange = function() { lang = this.value; aplicarLingua(); };

    function modalGenerico(html) {
        const m = document.getElementById("modal");
        document.getElementById("modalBox").innerHTML = html;
        m.style.display = "flex";
        m.onclick = (e) => { if(e.target === m) m.style.display = "none"; };
    }
    function fecharModal() { document.getElementById("modal").style.display = "none"; }

    document.getElementById("mAcerca").onclick = () => modalGenerico(`<h3>${T[lang].acerca}</h3><p>${T[lang].txtAcerca}</p>`);
    document.getElementById("mTermos").onclick = () => modalGenerico(`<h3>${T[lang].termos}</h3><p>${T[lang].txtTermos}</p>`);
    document.getElementById("mLocalizar").onclick = () => modalGenerico(`<h3>${T[lang].mapa}</h3><div class="simul-map">🗺️ Simulação Google Maps<br>Av. Global, 1000</div>`);
    document.getElementById("btnLogin").onclick = () => window.location.href = "LOGIN.html";

    document.getElementById("btnMenu").onclick = () => {
        let html = `<h3>${T[lang].modalTitulo}</h3><div class="country-grid">`;
        paisesLista.forEach(p => { html += `<div class="country-item" onclick="mostrarRestaurantes('${p}')">${p}</div>`; });
        html += `</div><button onclick="fecharModal()">Fechar</button>`;
        modalGenerico(html);
    };

    function mostrarRestaurantes(pais) {
        const restaurantes = getRestaurantesPorPais(pais);
        let html = `<h3>${T[lang].restaurantesTitulo} ${pais}</h3><div>`;
        restaurantes.forEach(rest => {
            html += `
                <div class="rest-item">
                    <span class="rest-nome">${rest}</span>
                    <button class="map-icon" onclick="event.stopPropagation(); verLocalizacao('${rest}', '${pais}')">📍</button>
                    <button class="enter-btn" onclick="entrarRestaurante('${rest}', '${pais}')">Entrar</button>
                </div>`;
        });
        html += `<button onclick="fecharModal()">Voltar</button></div>`;
        modalGenerico(html);
    }

    function verLocalizacao(restaurante, pais) {
        modalGenerico(`<h3>📍 ${restaurante}</h3><div class="simul-map">🗺️ Simulação Google Maps<br>${restaurante}, ${pais}</div><button onclick="fecharModal()">Fechar</button>`);
    }

    function entrarRestaurante(restaurante, pais) {
        localStorage.setItem("restauranteSelecionado", restaurante);
        localStorage.setItem("paisSelecionado", pais);
        window.location.href = "CLIENTE-5.html";
    }

    aplicarLingua();
</script>
</body>
</html>
